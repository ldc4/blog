<p>前些天，被人问到浏览器缓存，突然感觉我对浏览器好陌生。<br>
平时，开发会勾上F12控制台的Disable cache，来避免缓存的影响，修复完一个问题，或者需求发布到开发联调环境上，总是让测试”多强刷几下“。<br>
但是用户不是程序员，有什么方案来无感精准控制浏览器缓存?  </p>
